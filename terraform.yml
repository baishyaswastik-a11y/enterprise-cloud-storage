# ============================================================
# Terraform CI/CD Pipeline — GitHub Actions
# Flow: PR → init → validate → plan → comment → approve → apply
# ============================================================

name: "Terraform Enterprise Storage"

on:
  push:
    branches: ["main"]
    paths: ["environments/**", "modules/**"]
  pull_request:
    branches: ["main"]
    paths: ["environments/**", "modules/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: ["dev", "staging", "prod"]
      action:
        description: "Action to perform"
        required: true
        type: choice
        options: ["plan", "apply", "destroy"]

# Prevent concurrent runs on same environment — avoids state corruption
concurrency:
  group: "terraform-${{ github.event.inputs.environment || 'dev' }}"
  cancel-in-progress: false  # Queue, don't cancel — safer for infra

env:
  TF_VERSION: "1.7.0"
  TF_VAR_FILE: "environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfvars"
  WORKING_DIR: "environments/${{ github.event.inputs.environment || 'dev' }}"

permissions:
  id-token: write       # OIDC auth to AWS — no static credentials stored
  contents: read
  pull-requests: write  # Post plan output as PR comment

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Validate + Lint (runs on every PR)
  # ──────────────────────────────────────────────
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: "github-actions-terraform-validate"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true   # Report but don't block on fmt

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="key=storage/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate" \
            -reconfigure
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run tfsec (security scan)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.WORKING_DIR }}
          soft_fail: false   # Block PR if HIGH severity issues found

      - name: Run checkov (compliance scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          check: "CKV_AWS_*"  # AWS-specific checks only
          quiet: true

  # ──────────────────────────────────────────────
  # JOB 2: Plan (runs on PR — posts to PR comment)
  # ──────────────────────────────────────────────
  plan:
    name: "Plan"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true  # Needed to capture plan output

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: "github-actions-terraform-plan"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=storage/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -out=tfplan \
            -no-color \
            -detailed-exitcode \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true   # We handle exit codes manually below

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}"
          path: "${{ env.WORKING_DIR }}/tfplan"
          retention-days: 5  # Plans expire — stale plans are dangerous

      # Post plan diff as PR comment — reviewers see exactly what will change
      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated, see Actions log for full output)'
              : planOutput;

            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const statusEmoji = exitCode === '0' ? '✅' : exitCode === '2' ? '⚠️' : '❌';
            const statusText = exitCode === '0' ? 'No changes' : exitCode === '2' ? 'Changes detected' : 'Plan failed';

            const body = `## Terraform Plan — \`${{ github.event.inputs.environment || 'dev' }}\`
            ${statusEmoji} **${statusText}**

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Commit: \`${{ github.sha }}\` | [View full log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            > ⚠️ This plan is valid for **5 days**. Apply after that requires re-plan.`;

            // Delete old plan comments to keep PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            for (const comment of comments) {
              if (comment.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ──────────────────────────────────────────────
  # JOB 3: Apply (only after manual approval)
  # prod requires environment protection rules in GitHub
  # ──────────────────────────────────────────────
  apply:
    name: "Apply"
    runs-on: ubuntu-latest
    needs: [validate, plan]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event.inputs.action == 'apply')
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      # For prod: set required reviewers in GitHub repo settings
      # Settings → Environments → prod → Required reviewers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: "github-actions-terraform-apply"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=storage/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}"
          path: ${{ env.WORKING_DIR }}

      # Apply the exact plan that was reviewed — not a fresh plan
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Post Apply summary
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Apply succeeded' : '❌ Apply failed';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Apply — \`${{ github.event.inputs.environment || 'dev' }}\`\n${status}\nApplied commit: \`${{ github.sha }}\``
            });
